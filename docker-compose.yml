version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wmedia_postgres
    restart: always
    environment:
      POSTGRES_USER: wmedia_user
      POSTGRES_PASSWORD: wmedia_password
      POSTGRES_DB: wmedia_editorial
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wmedia_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
